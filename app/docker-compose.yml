services:
  app:
    build: .
    image: rightmo:latest
    ports:
      - "8080:8080"
    environment:
      APP_ENVIRONMENT: local
      APP_LOG_LEVEL: INFO
    # Mirrors the production runtime contract: no writable filesystem, no
    # privilege escalation, capabilities dropped to the minimum. Run
    # `docker compose up` locally to prove the container behaves under
    # the same constraints it will run under in ECS.
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
